<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base e2e tests</title>
    <link href="../dist/mg-components.css" rel="stylesheet" type="text/css" />
    <link href="../dist/components/mg-button.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main>
      <h1>Components</h1>
      <section>
        <h2>Buttons</h2>
        <button class="mg-c-button mg-c-button--medium mg-c-button--primary">Primary button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--secondary">Secondary button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--info">Info button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--success">Success button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--warning">Warning button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--danger">Danger button</button>
        <h3>Sizes</h3>
        <button class="mg-c-button mg-c-button--medium mg-c-button--primary">Medium button</button>
        <button class="mg-c-button mg-c-button--large mg-c-button--primary">Large button</button>
        <h3>Full Width</h3>
        <button class="mg-c-button mg-c-button--medium mg-c-button--full-width mg-c-button--primary">Full width medium button</button>
        <button class="mg-c-button mg-c-button--large mg-c-button--full-width mg-c-button--primary">Full width large button</button>
        <h3>Disabled button</h3>
        <button class="mg-c-button mg-c-button--medium mg-c-button--primary" disabled>Disabled button</button>
        <button class="mg-c-button mg-c-button--medium mg-c-button--primary" aria-disabled="true">Aria disabled button</button>
      </section>
    </main>
  </body>
</html>
